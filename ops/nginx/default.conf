# =============================================================================
# CCM — nginx configuration for the React SPA
#
# Security requirements enforced here:
# - server_tokens off (do not expose nginx version)
# - gzip enabled for static asset performance
# - security headers on ALL responses (see nginx add_header inheritance note)
# - SPA fallback: try_files $uri /index.html for client-side routing
#
# IMPORTANT — nginx add_header inheritance rule:
#   When a location block defines ANY add_header directive, nginx NO LONGER
#   inherits add_header directives from the parent server block for that
#   location. All security headers must be explicitly repeated in every
#   location block that defines its own add_header directives.
#   See: https://nginx.org/en/docs/http/ngx_http_headers_module.html
# =============================================================================

# Never expose the nginx version in headers or error pages
server_tokens off;

# ---------------------------------------------------------------------------
# Gzip compression
# ---------------------------------------------------------------------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
  application/atom+xml
  application/geo+json
  application/javascript
  application/x-javascript
  application/json
  application/ld+json
  application/manifest+json
  application/rdf+xml
  application/rss+xml
  application/xhtml+xml
  application/xml
  font/eot
  font/otf
  font/ttf
  image/svg+xml
  text/css
  text/javascript
  text/plain
  text/xml;

server {
  listen 80;
  listen [::]:80;

  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ---------------------------------------------------------------------------
  # Security headers — server-block level
  #
  # These headers apply to responses that are NOT served from a location block
  # that defines its own add_header directives. All such location blocks below
  # MUST repeat the full set so that the inheritance override does not strip them.
  # ---------------------------------------------------------------------------
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always; — instructs browsers to use HTTPS only for 1 year.
  # IMPORTANT: This header MUST only be served over a TLS connection. In
  # production this container sits behind a TLS-terminating load balancer or
  # reverse proxy that sets X-Forwarded-Proto. Do NOT enable HSTS in a local
  # dev environment without TLS; browsers will refuse HTTP connections silently.
  # Once a browser receives this header it enforces HTTPS for max-age seconds —
  # eliminates SSL-stripping and downgrade attacks.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Content Security Policy — restrictive baseline; frontend-engineer may refine
  # to accommodate specific MUI or inline-style requirements.
  add_header Content-Security-Policy
    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' wss://*.telecmi.com wss://sbcind.telecmi.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self';"
    always;
  # ---------------------------------------------------------------------------

  # Vite content-hashed JS/CSS assets — cache aggressively
  # All security headers re-declared here due to nginx add_header inheritance rule.
  location ~* \.(js|css|woff2|woff|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  }

  # Images and icons
  location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
    expires 30d;
    add_header Cache-Control "public";
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  }

  # PWA manifest and service worker — must not be cached aggressively
  location ~* (manifest\.webmanifest|manifest\.json|sw\.js|workbox-.*)$ {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  }

  # ---------------------------------------------------------------------------
  # SSE endpoint — Server-Sent Events for agent real-time notifications.
  #
  # This location block MUST appear before the general /api/ block so that
  # nginx matches it with higher precedence (longest-prefix wins for plain
  # location directives).
  #
  # Key requirements for SSE over nginx:
  #   - proxy_buffering off   : disables nginx response buffering so events
  #                             are flushed to the client immediately.
  #   - proxy_cache off       : prevents any cache layer from holding the
  #                             response body.
  #   - proxy_read_timeout    : must be longer than the longest expected idle
  #                             period between events (set to 24 h; the backend
  #                             sends a keepalive comment every 25 s so the
  #                             connection stays alive under normal conditions).
  #   - Connection ''         : clears the hop-by-hop Connection header so the
  #                             upstream receives a clean HTTP/1.1 keep-alive.
  #   - chunked_transfer_encoding on : allows the backend to stream chunked
  #                             responses without nginx re-buffering them.
  #
  # The backend sets X-Accel-Buffering: no on SSE responses as a belt-and-
  # suspenders measure; nginx also honours that header when proxy_buffering is
  # already off.
  #
  # ---------------------------------------------------------------------------
  location /api/v1/agent/events {
    proxy_pass              http://ccm-api:3000/api/v1/agent/events;
    proxy_http_version      1.1;
    proxy_set_header        Connection        '';
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_buffering         off;
    proxy_cache             off;
    proxy_read_timeout      86400s;
    chunked_transfer_encoding on;
  }

  # ---------------------------------------------------------------------------
  # API reverse proxy — forward /api/ and /health to the Node.js API container.
  # Keeps the browser on the same origin so no cross-origin CORS is needed.
  # No static security headers added here — API responses carry their own headers.
  # ---------------------------------------------------------------------------
  location /api/ {
    proxy_pass         http://ccm-api:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";
    proxy_read_timeout 30s;
  }

  location /health {
    proxy_pass         http://ccm-api:3000/health;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   Connection        "";
  }

  # ---------------------------------------------------------------------------
  # SPA fallback — all unmatched routes serve index.html
  # This enables React Router to handle client-side routing.
  # All security headers re-declared due to nginx add_header inheritance rule.
  # ---------------------------------------------------------------------------
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' wss://*.telecmi.com wss://sbcind.telecmi.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self';"
      always;
  }

  # ---------------------------------------------------------------------------
  # Deny access to hidden files (e.g. .git, .env, .htaccess)
  # ---------------------------------------------------------------------------
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}
